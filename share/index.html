<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>OnBuch — Épreuve partagée</title>
  <meta name="description" content="Ouvre cette épreuve dans OnBuch — annales, corrigés et tuteur IA Léo pour réussir tes examens au Cameroun." />
  <meta name="theme-color" content="#E8590C" />
  <meta property="og:title" content="OnBuch — Épreuve partagée" />
  <meta property="og:description" content="Annales &amp; corrigés, tuteur IA Léo, cours et concours. Ouvre l'épreuve dans l'app OnBuch." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://onbuch-go.vercel.app/leo_celebrate.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="apple-touch-icon" href="leo_wave.png" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%23FDBE4F'/%3E%3Cstop offset='1' stop-color='%23EC7A0E'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='48' height='48' rx='13' fill='url(%23g)'/%3E%3Crect x='13' y='14' width='22' height='20' rx='4' fill='white'/%3E%3Cpath d='M18 25c2 3 10 3 12 0' fill='none' stroke='%23F4951F' stroke-width='2.4' stroke-linecap='round'/%3E%3Ccircle cx='24' cy='12' r='2.3' fill='white'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#FBF7F2; --paper:#FFFFFF; --ink:#1B1712; --ink2:#4B433A; --muted:#9B9183;
      --line:#EDE6DC; --o500:#E8590C; --o600:#D24E08; --o700:#A85607; --o50:#FCEEE2; --o100:#FCE9C7;
      --good:#1E9E63; --goodbg:#E5F3EB;
      --shadow:0 24px 60px rgba(40,25,10,.10);
      --display:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
      --body:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0}
    body{
      font-family:var(--body);color:var(--ink);min-height:100vh;line-height:1.5;
      background:
        radial-gradient(95% 50% at 50% -10%, #FFE7CE 0%, rgba(255,231,206,0) 58%),
        radial-gradient(75% 45% at 102% 2%, #FCE4C0 0%, rgba(252,228,192,0) 55%),
        var(--bg);
      -webkit-font-smoothing:antialiased;
    }
    .wrap{max-width:460px;margin:0 auto;padding:20px 20px 34px;min-height:100vh;display:flex;flex-direction:column}

    /* Header / marque */
    .brand{display:flex;align-items:center;gap:11px;margin-bottom:4px}
    .brand .mark{width:42px;height:42px;border-radius:13px;box-shadow:0 8px 18px rgba(232,89,12,.28);display:block}
    .brand b{font-family:var(--display);font-size:21px;font-weight:700;letter-spacing:-.025em}
    .brand b span{color:var(--o500)}

    /* Léo */
    .leo-stage{position:relative;display:flex;flex-direction:column;align-items:center;padding-top:14px;margin-bottom:-30px;z-index:3}
    .leo-ring{position:relative;width:128px;height:128px;border-radius:50%;
      background:radial-gradient(circle at 50% 38%, #FFF 0%, #FFF6EA 62%, #FCEAD2 100%);
      border:3px solid #fff;box-shadow:0 16px 30px rgba(40,25,10,.14), inset 0 0 0 1px var(--o100);
      display:flex;align-items:flex-end;justify-content:center;overflow:hidden}
    .leo-ring.sm{width:108px;height:108px}
    .leo{width:120px;height:120px;object-fit:contain;object-position:center bottom;
      animation:float 4.5s ease-in-out infinite;filter:drop-shadow(0 6px 6px rgba(40,25,10,.12))}
    .leo-ring.sm .leo{width:104px;height:104px}
    .bubble{position:absolute;top:2px;left:calc(50% + 40px);background:#fff;border:1.6px solid var(--line);
      border-radius:14px 14px 14px 4px;padding:7px 12px;font-weight:700;font-size:13px;color:var(--ink);
      white-space:nowrap;box-shadow:0 8px 18px rgba(40,25,10,.10);animation:pop .5s .35s both;z-index:4}

    /* Card */
    .card{background:var(--paper);border:1.5px solid var(--line);border-radius:28px;
      box-shadow:var(--shadow);position:relative;overflow:hidden}
    .card-accent{height:6px;background:linear-gradient(90deg,#FFB347,var(--o500) 60%,var(--o600))}
    .card-in{padding:34px 22px 24px}
    .eyebrow{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--o600);
      display:inline-flex;align-items:center;gap:7px}
    .eyebrow::before{content:"";width:16px;height:2px;border-radius:2px;background:var(--o500)}
    h1{font-family:var(--display);font-size:23px;line-height:1.22;margin:12px 0 0;letter-spacing:-.02em;font-weight:700}
    .lead{color:var(--ink2);font-size:14.5px;line-height:1.6;margin:8px 0 0}

    .meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
    .chip{font-size:12px;font-weight:700;color:var(--ink2);background:#F4EEE6;border-radius:999px;padding:5px 11px}
    .pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
    .pill{font-size:12px;font-weight:800;border-radius:10px;padding:7px 11px;display:inline-flex;align-items:center;gap:6px}
    .pill.pdf{color:#C0392B;background:#FAE7E4}.pill.cor{color:#1E9E63;background:#E5F3EB}.pill.vid{color:#7A5AE0;background:#EEE9FA}

    .helper{display:flex;align-items:center;gap:12px;margin-top:18px;padding:13px 14px;border-radius:16px;
      background:var(--o50);border:1.5px solid var(--o100)}
    .helper img{width:38px;height:38px;flex:none}
    .helper p{margin:0;font-size:13px;line-height:1.45;color:var(--o700);font-weight:600}
    .helper b{color:var(--ink)}

    /* Boutons */
    .btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;border:none;cursor:pointer;
      font-family:var(--body);font-size:15.5px;font-weight:700;border-radius:16px;padding:16px;margin-top:14px;
      text-decoration:none;transition:transform .12s ease, filter .12s ease}
    .btn:active{transform:translateY(1px) scale(.99)}
    .btn-primary{background:linear-gradient(135deg,#FFB347,var(--o500) 55%,var(--o600));color:#fff;
      box-shadow:0 12px 24px rgba(232,89,12,.30)}
    .btn-primary:hover{filter:brightness(1.03)}
    .btn-store{background:var(--ink);color:#fff}
    .btn-store:hover{filter:brightness(1.12)}
    .btn .ic{width:19px;height:19px;flex:none}

    .stores{margin-top:6px}
    .hint{font-size:12.5px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.55}

    /* Features (accueil) */
    .feat{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:18px}
    .feat .f{background:rgba(255,255,255,.65);border:1.5px solid var(--line);border-radius:16px;padding:13px 8px;text-align:center}
    .feat .fi{font-size:20px;line-height:1}
    .feat .ft{display:block;font-size:11.5px;font-weight:700;color:var(--ink2);margin-top:6px;line-height:1.3}

    .trust{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:16px;font-size:12px;color:var(--muted);font-weight:600;text-align:center}
    .trust .dot{width:5px;height:5px;border-radius:50%;background:var(--good);display:inline-block;flex:none}

    .foot{margin-top:auto;padding-top:26px;text-align:center;font-size:12px;color:var(--muted);line-height:1.6}

    .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--o500);border-radius:50%;animation:spin 1s linear infinite;margin:60px auto}
    .anim{animation:fadeUp .5s ease both}

    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    @keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
    @media (prefers-reduced-motion:reduce){.leo,.anim,.bubble{animation:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <svg class="mark" viewBox="0 0 48 48" aria-hidden="true">
        <defs><linearGradient id="ob" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#FDBE4F"/><stop offset=".55" stop-color="#F4951F"/><stop offset="1" stop-color="#EC7A0E"/>
        </linearGradient></defs>
        <rect width="48" height="48" rx="13" fill="url(#ob)"/>
        <rect x="13" y="14.5" width="22" height="19" rx="4" fill="#fff"/>
        <rect x="23.1" y="14.5" width="1.8" height="19" rx=".9" fill="#FBE3BC"/>
        <path d="M18 24.5c2.1 3 9.9 3 12 0" fill="none" stroke="#F4951F" stroke-width="2.3" stroke-linecap="round"/>
        <circle cx="24" cy="12.2" r="2.3" fill="#fff"/>
        <path d="M29.5 33.5v6l2-1.5 2 1.5v-6z" fill="#F2C21A"/>
      </svg>
      <b>On<span>Buch</span></b>
    </div>
    <div id="app"><div class="spinner"></div></div>
    <div class="foot">OnBuch · Annales, corrigés &amp; tuteur IA Léo<br/>Pensé pour les élèves du Cameroun 🇨🇲</div>
  </div>

  <script>
    var ENDPOINT = 'https://nyc.cloud.appwrite.io/v1';
    var PROJECT = '6a30463b00001375e229';
    var DB = '6a3047f8001d11d1b3c1';

    function param(){
      var m = location.pathname.match(/\/a\/([^\/?#]+)/);
      if (m) return decodeURIComponent(m[1]);
      return new URLSearchParams(location.search).get('a') || '';
    }
    function api(path){
      return fetch(ENDPOINT + path, { headers: { 'X-Appwrite-Project': PROJECT } })
        .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); });
    }
    function esc(s){ var d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }

    var id = param();
    var stores = {};

    Promise.all([
      api('/databases/'+DB+'/collections/app_config/documents').then(function(j){
        (j.documents||[]).forEach(function(d){ stores[d.key]=d.value; });
      }).catch(function(){}),
      id ? api('/databases/'+DB+'/collections/annales/documents/'+encodeURIComponent(id)) : Promise.resolve(null)
    ]).then(function(res){
      render(res[1]);
    }).catch(function(){ render(null); });

    function storeButtons(){
      var html = '';
      if (stores.playStoreUrl) html += '<a class="btn btn-store" href="'+esc(stores.playStoreUrl)+'">'+playIcon()+' Télécharger sur Google Play</a>';
      if (stores.appStoreUrl) html += '<a class="btn btn-store" href="'+esc(stores.appStoreUrl)+'">'+appleIcon()+' Télécharger sur l\'App Store</a>';
      if (!html) html = '<a class="btn btn-store" href="https://onbuch-app.vercel.app">'+globeIcon()+' Ouvrir la version web</a>';
      return html;
    }
    function playIcon(){ return '<svg class="ic" viewBox="0 0 24 24" fill="#fff"><path d="M3.6 2.3 13.4 12 3.6 21.7c-.3-.2-.6-.6-.6-1.1V3.4c0-.5.3-.9.6-1.1zM14.8 13.4l2.6 2.6-9 5.1zM18.6 9.6l2.7 1.5c.6.4.6 1.4 0 1.8l-2.7 1.5-2.9-2.9zM5.8 2.4 16 8.2l-2.6 2.6z"/></svg>'; }
    function appleIcon(){ return '<svg class="ic" viewBox="0 0 384 512" fill="#fff"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>'; }
    function globeIcon(){ return '<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/></svg>'; }
    function docIcon(){ return '<svg viewBox="0 0 24 24"><path d="M6 2h9l5 5v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm8 1.5V8h4.5z"/></svg>'; }
    function feature(icon,label){ return '<div class="f"><span class="fi">'+icon+'</span><span class="ft">'+label+'</span></div>'; }

    function render(doc){
      var app = document.getElementById('app');

      if (!doc){
        app.innerHTML =
          '<div class="leo-stage anim">'+
            '<div class="leo-ring"><img class="leo" src="leo_wave.png" alt="Léo, le tuteur d\'OnBuch" /></div>'+
          '</div>'+
          '<div class="card anim">'+
            '<div class="card-accent"></div>'+
            '<div class="card-in">'+
              '<div class="eyebrow">L\'app n°1 des examens</div>'+
              '<h1>Réussis tes examens avec OnBuch</h1>'+
              '<p class="lead">Annales &amp; corrigés, le tuteur IA <b>Léo</b>, des cours et tous les concours — tout pour cartonner, réuni dans une seule app.</p>'+
              '<div class="stores">'+storeButtons()+'</div>'+
            '</div>'+
          '</div>'+
          '<div class="feat anim">'+
            feature('📄','Annales + corrigés')+ feature('🦁','Tuteur IA Léo')+ feature('📶','Mode hors-ligne')+
          '</div>'+
          '<div class="trust anim"><i class="dot"></i>Gratuit · 100 % adapté au programme camerounais</div>';
        return;
      }

      var pills='';
      if ((doc.fileUrl||'').trim()) pills+='<span class="pill pdf">📕 Sujet PDF</span>';
      if ((doc.corrigeUrl||'').trim()) pills+='<span class="pill cor">✅ Corrigé</span>';
      if ((doc.videoUrl||'').trim()) pills+='<span class="pill vid">▶ Vidéo corrigée</span>';
      var meta='';
      [doc.category,doc.subject,doc.track,doc.session,doc.year].forEach(function(v){ if(v&&String(v).trim()) meta+='<span class="chip">'+esc(v)+'</span>'; });

      app.innerHTML =
        '<div class="leo-stage anim">'+
          '<div class="bubble">Bloqué ? Je t\'aide 💪</div>'+
          '<div class="leo-ring sm"><img class="leo" src="leo_encourage.png" alt="Léo" /></div>'+
        '</div>'+
        '<div class="card anim">'+
          '<div class="card-accent"></div>'+
          '<div class="card-in">'+
            '<div class="eyebrow">Épreuve partagée</div>'+
            '<h1>'+esc(doc.title||'Épreuve')+'</h1>'+
            (meta?('<div class="meta">'+meta+'</div>'):'')+
            (pills?('<div class="pills">'+pills+'</div>'):'')+
            '<div class="helper">'+
              '<img src="leo_encourage.png" alt="" />'+
              '<p>Ouvre dans l\'app pour <b>lire le sujet</b>, voir le <b>corrigé</b> et demander à <b>Léo</b> de t\'expliquer pas à pas.</p>'+
            '</div>'+
            '<button class="btn btn-primary" id="open">📲 Ouvrir dans l\'app OnBuch</button>'+
            '<div class="stores" id="dl" style="display:none">'+
              '<p class="hint">Tu n\'as pas encore l\'app ? Installe-la pour ouvrir cette épreuve :</p>'+
              storeButtons()+
            '</div>'+
          '</div>'+
        '</div>'+
        '<p class="hint">Si l\'app ne s\'ouvre pas automatiquement, installe OnBuch puis rouvre ce lien.</p>';

      document.getElementById('open').addEventListener('click', function(){
        document.getElementById('dl').style.display='block';
        window.location.href = 'onbuch://annale/'+encodeURIComponent(id);
      });
    }
  </script>
</body>
</html>
